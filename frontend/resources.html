<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - GateMaster AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        /* Dark Mode & Accordion Specific Styles */
        :root {
            --card-bg: white;
            --accordion-bg: #f8fafc;
            --accordion-hover: #f1f5f9;
        }

        [data-theme='dark'] {
            --bg-main: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --card-bg: #1e293b;
            --accordion-bg: #0f172a;
            --accordion-hover: #1e293b;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
        }

        /* Search Bar */
        .search-container {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            margin: 2rem auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            outline: none;
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }

        /* Accordion Structure */
        details {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            background: var(--card-bg);
            overflow: hidden;
        }

        summary {
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 1.125rem;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--accordion-bg);
            transition: background 0.2s;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: var(--accordion-hover);
        }

        summary::after {
            content: "+";
            font-size: 1.5rem;
            color: var(--primary);
        }

        details[open] > summary::after {
            content: "−";
        }

        .details-content {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        /* Sub-accordion */
        .sub-accordion details {
            margin-bottom: 0.5rem;
            border-color: var(--border-color);
            background: var(--card-bg);
        }

        .sub-accordion summary {
            font-size: 1rem;
            font-weight: 500;
            background: var(--card-bg);
        }

        /* Material UI Style Resource Card */
        .resource-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            margin-top: 1rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .rc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rc-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Progress Indicator */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .progress-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-bar-bg {
            width: 100px;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Resource Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .resource-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .resource-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        /* Theme Toggle */
        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            GateMaster AI
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/resources" class="active">Resources</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/planner">AI Chat</a>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                🌙
            </button>
            <a href="/dashboard" class="btn btn-primary">Start Learning</a>
        </div>
    </nav>

    <section class="container text-center" style="padding-top: 4rem;">
        <span class="section-subtitle">MATERIAL UI RESOURCES</span>
        <h1>Comprehensive Study Hub</h1>
        <p style="max-width: 700px; margin: 0 auto;">Drill down through Subjects and Topics to instantly access Notes, Cheat Sheets, Formula Sheets, and PYQs.</p>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search for any subject or topic..." id="searchInput" style="flex: 2;">
            <select class="search-input" id="subjectFilter" style="flex: 1; cursor: pointer;">
                <option value="All Subjects">All Subjects</option>
            </select>
        </div>
        
        <div id="accordionContainer" style="text-align: left; max-width: 900px; margin: 0 auto;">
            <!-- Accordions Injected Here -->
            <div style="text-align: center; color: var(--text-muted); padding: 3rem;">Loading resources...</div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('accordionContainer');
            const searchInput = document.getElementById('searchInput');
            let resources = [];
            
            // Theme Toggle Logic
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

            themeToggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            });

            // Fetch Data
            try {
                const res = await fetch('/api/resources');
                resources = await res.json();
            } catch (e) {
                console.error("Failed to load resources:", e);
                // Fallback for UI demonstration
                resources = [
                    {subject_name: "01_Engineering_Mathematics", topic_name: "Discrete_Mathematics - Sets", title: "Sets", resource_type: "notes", url: "/placeholder.pdf"},
                    {subject_name: "01_Engineering_Mathematics", topic_name: "Discrete_Mathematics - Sets", title: "Sets", resource_type: "revision_notes", url: "/placeholder.pdf"},
                    {subject_name: "01_Engineering_Mathematics", topic_name: "Discrete_Mathematics - Sets", title: "Sets", resource_type: "formula_sheet", url: "/placeholder.pdf"},
                    {subject_name: "01_Engineering_Mathematics", topic_name: "Discrete_Mathematics - Sets", title: "Sets", resource_type: "pyq", url: "/placeholder.pdf"},
                ];
            }

            // Build Hierarchy: Subject -> Main Topic -> Sub Topic
            let hierarchy = {};

            resources.forEach(r => {
                // Clean subject name
                const cleanSubject = r.subject_name.replace(/^[0-9]+_/, '').replace(/_/g, ' ');
                
                // Parse topic name into Main and Sub
                const topicParts = r.topic_name ? r.topic_name.split(' - ') : ['General'];
                const mainTopic = topicParts[0].replace(/_/g, ' ');
                const subTopic = (topicParts.slice(1).join(' - ') || mainTopic).replace(/_/g, ' ');

                if (!hierarchy[cleanSubject]) hierarchy[cleanSubject] = {};
                if (!hierarchy[cleanSubject][mainTopic]) hierarchy[cleanSubject][mainTopic] = {};
                if (!hierarchy[cleanSubject][mainTopic][subTopic]) hierarchy[cleanSubject][mainTopic][subTopic] = {};

                // Map resource types to specific buttons
                // Notes, Cheat Sheet (revision_notes or handwritten_notes), Formula Sheet, PYQs
                const t = r.resource_type;
                if (t === 'notes') hierarchy[cleanSubject][mainTopic][subTopic].notes = r.url;
                if (t === 'revision_notes' || t === 'handwritten_notes') hierarchy[cleanSubject][mainTopic][subTopic].cheatSheet = r.url;
                if (t === 'formula_sheet') hierarchy[cleanSubject][mainTopic][subTopic].formulaSheet = r.url;
                if (t === 'pyq') hierarchy[cleanSubject][mainTopic][subTopic].pyqs = r.url;
            });

            const subjectSelect = document.getElementById('subjectFilter');
            Object.keys(hierarchy).sort().forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                subjectSelect.appendChild(option);
            });

            // Calculate mock progress based on strings so it stays consistent
            const getProgress = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return Math.abs(hash % 101); // 0 to 100
            };

            const render = () => {
                const term = searchInput.value.toLowerCase();
                const subjectFilterVal = subjectSelect.value;
                let html = '';

                Object.keys(hierarchy).forEach(subject => {
                    if (subjectFilterVal !== 'All Subjects' && subject !== subjectFilterVal) return;
                    
                    const mains = hierarchy[subject];
                    let subjectHasMatch = false;
                    let mainHtml = '';

                    Object.keys(mains).forEach(mainTopic => {
                        const subs = mains[mainTopic];
                        let mainHasMatch = false;
                        let subHtml = '';

                        Object.keys(subs).forEach(subTopic => {
                            const resObj = subs[subTopic];
                            
                            // Check search match
                            const searchStr = `${subject} ${mainTopic} ${subTopic}`.toLowerCase();
                            if (!searchStr.includes(term)) return;

                            subjectHasMatch = true;
                            mainHasMatch = true;

                            const progress = getProgress(subTopic);

                            // Resource Card HTML
                            subHtml += `
                                <div class="resource-card">
                                    <div class="rc-header">
                                        <div class="rc-title">${subTopic}</div>
                                        <div class="progress-container">
                                            <span class="progress-label">${progress}% Completed</span>
                                            <div class="progress-bar-bg">
                                                <div class="progress-bar-fill" style="width: ${progress}%"></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="btn-grid">
                                        <a href="${resObj.notes || '#'}" target="_blank" class="resource-btn">
                                            📄 View Notes
                                        </a>
                                        <a href="${resObj.cheatSheet || '#'}" target="_blank" class="resource-btn">
                                            ⚡ Cheat Sheet
                                        </a>
                                        <a href="${resObj.formulaSheet || '#'}" target="_blank" class="resource-btn">
                                            ∑ Formula Sheet
                                        </a>
                                        <a href="${resObj.pyqs || '#'}" target="_blank" class="resource-btn">
                                            🎯 View PYQs
                                        </a>
                                    </div>
                                </div>
                            `;
                        });

                        if (mainHasMatch) {
                            // Automatically open details if there's a search term
                            const isOpen = term.length > 0 ? 'open' : '';
                            mainHtml += `
                                <div class="sub-accordion">
                                    <details ${isOpen}>
                                        <summary>${mainTopic}</summary>
                                        <div class="details-content">
                                            ${subHtml}
                                        </div>
                                    </details>
                                </div>
                            `;
                        }
                    });

                    if (subjectHasMatch) {
                        const isOpen = term.length > 0 ? 'open' : '';
                        html += `
                            <details ${isOpen}>
                                <summary>${subject}</summary>
                                <div class="details-content">
                                    ${mainHtml}
                                </div>
                            </details>
                        `;
                    }
                });

                container.innerHTML = html || '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">No topics found matching your search.</div>';
            };

            searchInput.addEventListener('input', render);
            subjectSelect.addEventListener('change', render);
            render();
        });
    </script>
</body>
</html>
