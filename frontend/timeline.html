<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personalized Roadmap - GateMaster AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .timeline-container { max-width: 900px; margin: 4rem auto; position: relative; padding: 2rem; }
        
        .timeline { position: relative; margin: 0 auto; }
        .timeline::before { content: ''; position: absolute; left: 50%; width: 4px; background: var(--border-color); top: 0; bottom: 0; transform: translateX(-50%); border-radius: 4px; }
        
        .timeline-item { position: relative; width: 50%; padding: 2rem; box-sizing: border-box; }
        .timeline-item:nth-child(odd) { left: 0; text-align: right; }
        .timeline-item:nth-child(even) { left: 50%; text-align: left; }
        
        .timeline-dot { position: absolute; width: 24px; height: 24px; background: var(--primary); border: 4px solid white; border-radius: 50%; top: 2rem; right: -12px; z-index: 1; box-shadow: var(--shadow-sm); }
        .timeline-item:nth-child(even) .timeline-dot { left: -12px; }
        
        .timeline-content { background: white; border: 1px solid var(--border-color); padding: 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); position: relative; }
        .timeline-item:nth-child(odd) .timeline-content { margin-right: 2rem; }
        .timeline-item:nth-child(even) .timeline-content { margin-left: 2rem; }
        
        .timeline-date { color: var(--primary); font-weight: 700; font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .timeline-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-main); }
        .timeline-body { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }
        
        /* Markdown rendering inside timeline body */
        .timeline-body h4 { color: var(--text-main); margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem; }
        .timeline-body ul { margin-left: 1.5rem; padding-left: 0; margin-bottom: 1rem; }
        .timeline-body li { margin-bottom: 0.5rem; }
        
        .page-header { text-align: center; margin: 4rem 0 2rem; }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .page-header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.6; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 4rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="navbar" style="border-bottom: 1px solid var(--border-color);">
        <div class="logo">
            <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            GateMaster AI
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/resources">Resources</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/planner">AI Chat</a>
            <a href="/timeline" class="active">Roadmap</a>
        </div>
        <div class="nav-actions">
            <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Your Personalized <span class="text-primary">GATE Roadmap</span></h1>
            <p>AI-generated daily and monthly deadlines, smart methodologies, and cheat sheet topics tailored exactly to your appearing year and current progress.</p>
        </div>
        
        <div id="loader" class="loader"></div>
        
        <div class="timeline-container">
            <div id="timeline" class="timeline" style="display:none;">
                <!-- Timeline items injected here -->
            </div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('user_id')) {
            window.location.href = '/login';
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        async function fetchTimeline() {
            try {
                const res = await fetch(`/api/timeline/${localStorage.getItem('user_id')}`);
                const data = await res.json();
                
                document.getElementById('loader').style.display = 'none';
                
                if(data.success) {
                    const timelineEl = document.getElementById('timeline');
                    timelineEl.style.display = 'block';
                    
                    data.roadmap.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'timeline-item';
                        
                        div.innerHTML = `
                            <div class="timeline-dot"></div>
                            <div class="timeline-content">
                                <div class="timeline-date">${item.deadline}</div>
                                <h3 class="timeline-title">${item.subject}</h3>
                                <div class="timeline-body">${item.methodology_html}</div>
                            </div>
                        `;
                        timelineEl.appendChild(div);
                    });
                } else {
                    document.getElementById('timeline').innerHTML = `<p style="text-align:center; color:red;">Error: ${data.detail}</p>`;
                    document.getElementById('timeline').style.display = 'block';
                }
            } catch(e) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('timeline').innerHTML = `<p style="text-align:center; color:red;">Failed to connect to server.</p>`;
                document.getElementById('timeline').style.display = 'block';
            }
        }
        
        fetchTimeline();
    </script>
</body>
</html>
